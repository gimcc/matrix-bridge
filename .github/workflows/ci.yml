name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Gate: formatting must pass first ────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt
      - run: cargo fmt --check

  # ── Parallel checks: any failure cancels the rest ──────────
  check:
    name: ${{ matrix.name }}
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Clippy
            cmd: cargo clippy --all-targets -- -D warnings
            components: clippy
            cache-key: clippy
          - name: Test
            cmd: cargo test
            components: ""
            cache-key: test
          - name: Doc
            cmd: cargo doc --no-deps
            components: ""
            cache-key: doc

    env:
      RUSTDOCFLAGS: ${{ matrix.name == 'Doc' && '-D warnings' || '' }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: ${{ matrix.components }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache-key }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache-key }}-
      - run: ${{ matrix.cmd }}

  deny:
    name: Cargo Deny
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
