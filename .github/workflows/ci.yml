name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Gate: formatting must pass first ────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: "1.88"
          components: rustfmt
      - run: cargo fmt --check

  # ── Parallel checks: any failure cancels the rest ──────────
  check:
    name: ${{ matrix.name }}
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Clippy
            cmd: cargo clippy --all-targets -- -D warnings
            components: clippy
            cache-key: clippy
          - name: Test
            cmd: cargo test
            components: ""
            cache-key: test
          - name: Doc
            cmd: cargo doc --no-deps
            components: ""
            cache-key: doc

    env:
      RUSTDOCFLAGS: ${{ matrix.name == 'Doc' && '-D warnings' || '' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: "1.88"
          components: ${{ matrix.components }}
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache-key }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache-key }}-
      - run: ${{ matrix.cmd }}

  deny:
    name: Cargo Deny
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2
